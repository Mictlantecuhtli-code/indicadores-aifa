<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores 2.0 - AIFA | Iniciar Sesión</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        
        .error-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- Container principal -->
    <div class="w-full max-w-md">
        <!-- Logo y título -->
        <div class="text-center mb-8">
            <div class="logo-animation mb-6">
                <img src="assets/AIFA_Logo.png" alt="AIFA Logo" class="h-20 mx-auto">
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Indicadores 2.0</h1>
            <p class="text-blue-100 text-lg">Aeropuerto Internacional Felipe Ángeles</p>
        </div>
        
        <!-- Formulario de login -->
        <div class="glass-effect rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-2">Iniciar Sesión</h2>
                <p class="text-gray-600">Accede a tu cuenta para continuar</p>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <!-- Campo de email -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-medium text-gray-700">
                        <span class="material-icons text-sm mr-1 align-middle">email</span>
                        Correo Electrónico
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition-all duration-200"
                        placeholder="tu.nombre@aifa.aero"
                        autocomplete="email"
                    >
                    <div id="emailError" class="text-red-500 text-sm hidden">
                        <span class="material-icons text-sm mr-1 align-middle">error</span>
                        <span></span>
                    </div>
                </div>
                
                <!-- Campo de contraseña -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-medium text-gray-700">
                        <span class="material-icons text-sm mr-1 align-middle">lock</span>
                        Contraseña
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none input-focus transition-all duration-200 pr-12"
                            placeholder="••••••••"
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            id="togglePassword" 
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                        >
                            <span class="material-icons">visibility</span>
                        </button>
                    </div>
                    <div id="passwordError" class="text-red-500 text-sm hidden">
                        <span class="material-icons text-sm mr-1 align-middle">error</span>
                        <span></span>
                    </div>
                </div>
                
                <!-- Mensaje de error general -->
                <div id="generalError" class="text-red-500 text-sm hidden bg-red-50 border border-red-200 rounded-lg p-3">
                    <div class="flex items-center">
                        <span class="material-icons text-sm mr-2">error</span>
                        <span></span>
                    </div>
                </div>
                
                <!-- Botón de login -->
                <button 
                    type="submit" 
                    id="loginButton" 
                    class="w-full btn-primary text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 flex items-center justify-center"
                >
                    <span id="loginButtonText">Iniciar Sesión</span>
                    <span id="loginSpinner" class="hidden ml-2">
                        <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
                    </span>
                </button>
            </form>
            
            <!-- Footer -->
            <div class="mt-8 text-center text-sm text-gray-500">
                <p>¿Problemas para acceder?</p>
                <p class="mt-1">Contacta al administrador del sistema</p>
            </div>
        </div>
        
        <!-- Información adicional -->
        <div class="text-center mt-8 text-blue-100 text-sm">
            <p>Sistema de Indicadores v2.0</p>
            <p>Solo personal autorizado de AIFA</p>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/guards.js"></script>
    <script src="js/ui.js"></script>
    
    <script>
        // Variables globales
        let isSubmitting = false;
        
        // Inicializar página de login
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Verificar si ya está autenticado
                await window.auth.handleAuthRedirect('login', false);
                
                // Configurar event listeners
                setupEventListeners();
                
                // Focus en el campo de email
                document.getElementById('email').focus();
                
            } catch (error) {
                console.error('Error inicializando login:', error);
            }
        });
        
        // Configurar event listeners
        function setupEventListeners() {
            // Formulario de login
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Toggle de contraseña
            document.getElementById('togglePassword').addEventListener('click', togglePasswordVisibility);
            
            // Validación en tiempo real
            document.getElementById('email').addEventListener('blur', validateEmail);
            document.getElementById('email').addEventListener('input', clearEmailError);
            document.getElementById('password').addEventListener('input', clearPasswordError);
            
            // Enter en cualquier campo
            document.getElementById('email').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('password').focus();
                }
            });
        }
        
        // Manejar envío del formulario
        async function handleLogin(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            // Obtener datos del formulario
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Validaciones básicas
            if (!validateForm(email, password)) {
                return;
            }
            
            try {
                isSubmitting = true;
                showLoadingState(true);
                clearAllErrors();
                
                // Intentar login
                const result = await window.auth.signIn(email, password);
                
                if (result.success) {
                    // Mostrar mensaje de éxito
                    showSuccessMessage();
                    
                    // Redirigir después de un breve delay
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    
                } else {
                    // Mostrar error
                    showError(result.message);
                    
                    // Añadir efecto de shake al formulario
                    const form = document.getElementById('loginForm');
                    form.classList.add('error-shake');
                    setTimeout(() => {
                        form.classList.remove('error-shake');
                    }, 500);
                }
                
            } catch (error) {
                console.error('Error en login:', error);
                showError('Error inesperado. Intenta de nuevo.');
                
            } finally {
                isSubmitting = false;
                showLoadingState(false);
            }
        }
        
        // Validar formulario
        function validateForm(email, password) {
            let isValid = true;
            
            // Validar email
            if (!email) {
                showFieldError('email', 'El correo electrónico es requerido');
                isValid = false;
            } else if (!window.supabaseClient.validateAifaEmail(email)) {
                showFieldError('email', 'Solo se permiten correos del dominio @aifa.aero');
                isValid = false;
            }
            
            // Validar contraseña
            if (!password) {
                showFieldError('password', 'La contraseña es requerida');
                isValid = false;
            } else if (password.length < 6) {
                showFieldError('password', 'La contraseña debe tener al menos 6 caracteres');
                isValid = false;
            }
            
            return isValid;
        }
        
        // Validar email en tiempo real
        function validateEmail() {
            const email = document.getElementById('email').value.trim();
            
            if (email && !window.supabaseClient.validateAifaEmail(email)) {
                showFieldError('email', 'Solo se permiten correos del dominio @aifa.aero');
                return false;
            }
            
            clearFieldError('email');
            return true;
        }
        
        // Mostrar estado de carga
        function showLoadingState(isLoading) {
            const button = document.getElementById('loginButton');
            const buttonText = document.getElementById('loginButtonText');
            const spinner = document.getElementById('loginSpinner');
            
            if (isLoading) {
                button.disabled = true;
                button.classList.add('opacity-75', 'cursor-not-allowed');
                buttonText.textContent = 'Verificando...';
                spinner.classList.remove('hidden');
            } else {
                button.disabled = false;
                button.classList.remove('opacity-75', 'cursor-not-allowed');
                buttonText.textContent = 'Iniciar Sesión';
                spinner.classList.add('hidden');
            }
        }
        
        // Mostrar mensaje de éxito
        function showSuccessMessage() {
            clearAllErrors();
            
            const button = document.getElementById('loginButton');
            const buttonText = document.getElementById('loginButtonText');
            const spinner = document.getElementById('loginSpinner');
            
            button.classList.remove('btn-primary');
            button.classList.add('bg-green-500');
            buttonText.textContent = 'Acceso autorizado';
            spinner.classList.add('hidden');
            
            // Mostrar checkmark
            setTimeout(() => {
                buttonText.innerHTML = '<span class="material-icons">check_circle</span> Redirigiendo...';
            }, 500);
        }
        
        // Mostrar error general
        function showError(message) {
            const errorDiv = document.getElementById('generalError');
            const errorSpan = errorDiv.querySelector('span:last-child');
            
            errorSpan.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        // Mostrar error de campo específico
        function showFieldError(fieldName, message) {
            const errorDiv = document.getElementById(fieldName + 'Error');
            const errorSpan = errorDiv.querySelector('span:last-child');
            const inputField = document.getElementById(fieldName);
            
            errorSpan.textContent = message;
            errorDiv.classList.remove('hidden');
            inputField.classList.add('border-red-500', 'focus:border-red-500');
        }
        
        // Limpiar error de campo específico
        function clearFieldError(fieldName) {
            const errorDiv = document.getElementById(fieldName + 'Error');
            const inputField = document.getElementById(fieldName);
            
            errorDiv.classList.add('hidden');
            inputField.classList.remove('border-red-500', 'focus:border-red-500');
        }
        
        // Limpiar errores de email
        function clearEmailError() {
            clearFieldError('email');
        }
        
        // Limpiar errores de contraseña
        function clearPasswordError() {
            clearFieldError('password');
        }
        
        // Limpiar todos los errores
        function clearAllErrors() {
            clearFieldError('email');
            clearFieldError('password');
            document.getElementById('generalError').classList.add('hidden');
        }
        
        // Toggle visibilidad de contraseña
        function togglePasswordVisibility() {
            const passwordField = document.getElementById('password');
            const toggleButton = document.getElementById('togglePassword');
            const icon = toggleButton.querySelector('.material-icons');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordField.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>
</html>

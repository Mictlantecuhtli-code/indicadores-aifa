<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Indicadores AIFA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Histograma de Indicadores</h1>

  <label for="indicador">Indicador:</label>
  <select id="indicador"></select>

  <label for="anioA">Año A:</label>
  <select id="anioA">
    <option>2024</option>
    <option>2025</option>
  </select>

  <label for="anioB">Año B:</label>
  <select id="anioB">
    <option>2024</option>
    <option selected>2025</option>
  </select>

  <button onclick="cargarHistograma()">Comparar</button>

  <canvas id="histograma" width="800" height="400"></canvas>

  <script src="app.js"></script>
</body>
</html>

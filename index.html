<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Indicadores AIFA</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuración personalizada de Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'aifa-blue': '#003f7f',
            'aifa-dark': '#002a56',
            'aifa-light': '#e6f0ff'
          }
        }
      }
    };
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Estilos personalizados -->
  <style>
    .toast {
      animation: slideIn 0.3s ease-out;
    }
    
    .toast.removing {
      animation: slideOut 0.3s ease-in forwards;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    @keyframes slideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }
      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }
    
    .tab-button.active {
      border-color: #003f7f;
      color: #003f7f;
    }
    
    .spinner {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Estilo para inputs con error */
    .input-error {
      border-color: #ef4444;
      background-color: #fef2f2;
    }
    
    /* Estilo para botones deshabilitados */
    .btn-disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* Animación de carga */
    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">
  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo y título -->
        <div class="flex items-center space-x-4">
          <div class="flex-shrink-0">
            <img src="assets/AIFA_Logo.png" alt="Logo AIFA" class="h-12 w-auto" 
                 onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHZpZXdCb3g9IjAgMCA0OCA0OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iOCIgZmlsbD0iIzFFNDBBRiIvPgo8cGF0aCBkPSJNMTIgMzZIMzZWMTJIMTJWMzZaIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz4KPHA+dGggZD0iTTE4IDI0TDI0IDE4TDMwIDI0IiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgo8L3N2Zz4K';">
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">Sistema de Indicadores AIFA</h1>
            <p class="text-sm text-gray-600">Aeropuerto Internacional Felipe Ángeles</p>
          </div>
        </div>
        
        <!-- Navegación -->
        <nav class="hidden sm:flex items-center space-x-4">
          <button id="nav-home" class="nav-button flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 bg-white hover:bg-gray-100">
            <i data-lucide="home" class="w-4 h-4"></i><span>Inicio</span>
          </button>
          <button id="nav-visualizacion" class="nav-button flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 bg-white hover:bg-gray-100">
            <i data-lucide="bar-chart-3" class="w-4 h-4"></i><span>Visualización</span>
          </button>
          <button id="nav-captura" class="nav-button flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 bg-white hover:bg-gray-100">
            <i data-lucide="edit" class="w-4 h-4"></i><span>Captura</span>
          </button>
          <button id="nav-admin" class="nav-button flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 bg-white hover:bg-gray-100">
            <i data-lucide="settings" class="w-4 h-4"></i><span>Administración</span>
          </button>
          <button id="nav-panel-directivos" class="nav-button px-4 py-2 text-sm font-medium text-gray-600 bg-white rounded-lg hover:bg-gray-100">
            <i data-lucide="trending-up" class="w-4 h-4 inline mr-2"></i>
            Panel Directivos
          </button>
        </nav>
        
        <!-- Usuario -->
        <div class="flex items-center space-x-3">
          <div id="user-info" class="hidden text-right">
            <div class="text-sm font-medium text-gray-900" id="user-name">Usuario</div>
            <div class="text-xs text-gray-600" id="user-role">Rol</div>
          </div>
          <button id="user-menu-button" class="flex items-center gap-2 px-3 py-2 rounded-lg text-gray-600 bg-white hover:bg-gray-100">
            <i data-lucide="user" class="w-4 h-4"></i><span class="hidden sm:inline">Cuenta</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="bg-gray-100 border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2 text-sm text-gray-600" id="breadcrumb">
      <span class="inline-flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Inicio</span>
    </div>
  </div>

  <!-- Contenedor principal para vistas -->
  <main id="app-container" class="max-w-7xl mx-auto p-4">
    <!-- Contenido se carga dinámicamente aquí -->
    <div class="flex items-center justify-center py-12">
      <div class="text-center">
        <i data-lucide="loader-2" class="w-8 h-8 text-aifa-blue mx-auto mb-4 spinner"></i>
        <p class="text-gray-600">Cargando aplicación<span class="loading-dots"></span></p>
      </div>
    </div>
  </main>

  <!-- Contenedor de notificaciones -->
  <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

  <!-- Loading overlay -->
  <div id="loading-container" class="fixed inset-0 hidden z-40">
    <div class="w-full h-full flex items-center justify-center bg-black/30 backdrop-blur-sm">
      <div class="bg-white px-6 py-4 rounded-lg shadow-lg flex items-center gap-3">
        <i data-lucide="loader-2" class="w-5 h-5 animate-spin text-aifa-blue"></i>
        <span id="loading-text">Cargando…</span>
      </div>
    </div>
  </div>

  <!-- Modal genérico -->
  <div id="modal-overlay" class="fixed inset-0 hidden z-50 bg-black/40">
    <div class="mx-auto mt-24 max-w-lg bg-white rounded-lg shadow-lg p-6">
      <h3 id="modal-title" class="text-lg font-semibold mb-4">Modal</h3>
      <div id="modal-content" class="mb-6"></div>
      <div id="modal-actions" class="flex justify-end gap-3"></div>
    </div>
  </div>

  <!-- Scripts de la aplicación -->
  <script>
    // Configuración global de errores
    window.addEventListener('error', function(e) {
      console.error('❌ Error global capturado:', e.error);
      
      // Mostrar mensaje de error al usuario si hay UI disponible
      if (window.ui && window.ui.showToast) {
        window.ui.showToast('Ha ocurrido un error inesperado', 'error');
      }
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('❌ Promise rechazada:', e.reason);
      
      // Mostrar mensaje de error al usuario si hay UI disponible
      if (window.ui && window.ui.showToast) {
        window.ui.showToast('Error de conexión o procesamiento', 'error');
      }
    });
  </script>

  <!-- Inicialización de la aplicación como módulo -->
  <script type="module">
    try {
      // Importar módulos principales
      const config = await import('./js/config.js');
      const router = await import('./js/lib/router.js');
      const ui = await import('./js/lib/ui.js');
      const supa = await import('./js/lib/supa.js');

      // Exponer funciones globales necesarias
      window.ui = ui;
      window.router = {
        navigateTo: router.navigateTo,
        goBack: router.goBack,
        reloadCurrentRoute: router.reloadCurrentRoute,
        parseCurrentRoute: router.parseCurrentRoute,
        getDefaultRouteForUser: router.getDefaultRouteForUser
      };

      // Configurar navegación del header
      function setupNavigation() {
        document.getElementById('nav-home')?.addEventListener('click', () => {
          router.navigateTo('/');
        });
        
        document.getElementById('nav-visualizacion')?.addEventListener('click', () => {
          router.navigateTo('/visualizacion');
        });
        
        document.getElementById('nav-captura')?.addEventListener('click', () => {
          router.navigateTo('/captura');
        });
        
        document.getElementById('nav-admin')?.addEventListener('click', () => {
          router.navigateTo('/admin');
        });
        document.getElementById('nav-panel-directivos')?.addEventListener('click', () => router.navigateTo('/panel-directivos'));

        // Menú de usuario con modal
        // Menú de usuario - VERSIÓN SIMPLIFICADA
        document.getElementById('user-menu-button')?.addEventListener('click', async () => {
            try {
                const supa = await import('./js/lib/supa.js');
                const ui = await import('./js/lib/ui.js');
                
                if (supa.appState.user) {
                    const profile = supa.appState.profile || await supa.getCurrentProfile();
                    
                    const getRoleName = (role) => {
                        const roles = {
                            'ADMIN': 'Administrador',
                            'DIRECTOR': 'Director', 
                            'SUBDIRECTOR': 'Subdirector',
                            'JEFE_AREA': 'Jefe de Área',
                            'CAPTURISTA': 'Capturista'
                        };
                        return roles[role] || role;
                    };
                    
                    const modalId = ui.showModal({
                        title: 'Mi Cuenta',
                        content: `
                            <div class="space-y-4">
                                <div class="bg-gradient-to-r from-blue-50 to-blue-100 rounded-lg p-4 border border-blue-200">
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center">
                                            <i data-lucide="user" class="w-6 h-6 text-white"></i>
                                        </div>
                                        <div class="flex-1">
                                            <p class="font-semibold text-gray-900">${profile?.nombre_completo || 'Usuario'}</p>
                                            <p class="text-sm text-gray-600">${supa.appState.user.email}</p>
                                        </div>
                                    </div>
                                    <div class="bg-white/50 rounded px-3 py-2">
                                        <p class="text-xs text-gray-500">Rol actual</p>
                                        <p class="font-medium text-blue-700">${getRoleName(profile?.rol_principal)}</p>
                                    </div>
                                </div>
                                
                                <button id="logout-btn-modal" class="w-full text-left px-4 py-2.5 text-red-600 hover:bg-red-50 rounded-lg flex items-center gap-3 transition-colors">
                                    <i data-lucide="log-out" class="w-5 h-5"></i>
                                    <span>Cerrar sesión</span>
                                </button>
                            </div>
                        `,
                        actions: [
                            {
                                text: 'Cerrar',
                                handler: async () => {
                                    ui.hideModal(modalId);
                                    return true; // Cerrar modal
                                }
                            }
                        ]
                    });
                    
                    // Recrear iconos
                    setTimeout(() => {
                        if (window.lucide) window.lucide.createIcons();
                        
                        // Configurar logout
                        document.getElementById('logout-btn-modal')?.addEventListener('click', async () => {
                            try {
                                const confirmed = await ui.showConfirmModal(
                                    '¿Estás seguro de cerrar sesión?',
                                    {
                                        title: 'Confirmar cierre de sesión',
                                        confirmText: 'Cerrar sesión',
                                        cancelText: 'Cancelar',
                                        type: 'warning'
                                    }
                                );
                                
                                if (!confirmed) return;
                                
                                ui.hideModal(modalId); // Cerrar modal de usuario primero
                                
                                await supa.signOut();
                                ui.showToast('Sesión cerrada correctamente', 'success');
                                
                                setTimeout(() => {
                                    window.location.hash = '#/login';
                                    location.reload();
                                }, 300);
                                
                            } catch (error) {
                                console.error('Error al cerrar sesión:', error);
                                ui.showToast('Error al cerrar sesión', 'error');
                            }
                        });
                    }, 100);
                    
                } else {
                    const router = await import('./js/lib/router.js');
                    router.navigateTo('/login');
                }
            } catch (error) {
                console.error('Error en menú de usuario:', error);
            }
        });
    }

      // Configurar navegación
      setupNavigation();

      // Inicializar iconos
      if (window.lucide) {
        window.lucide.createIcons();
      }

      // Navegación inicial
      if (!location.hash) {
        const defaultRoute = supa.isAuthenticated()
          ? (router.getDefaultRouteForUser?.(supa.appState.profile) || '/')
          : '/';

        router.navigateTo(defaultRoute, {}, true);
      } else {
        router.reloadCurrentRoute();
      }

      console.log('✅ Aplicación inicializada correctamente');

    } catch (error) {
      console.error('❌ Error al inicializar la aplicación:', error);
      
      // Mostrar error en la interfaz
      const container = document.getElementById('app-container');
      if (container) {
        container.innerHTML = `
          <div class="text-center py-12">
            <i data-lucide="alert-circle" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">Error al cargar la aplicación</h2>
            <p class="text-gray-600 mb-4">Ha ocurrido un error al inicializar el sistema.</p>
            <div class="space-y-2 text-sm text-gray-500 max-w-md mx-auto">
              <p><strong>Error:</strong> ${error.message}</p>
              <p>Verifique la configuración y que todos los archivos estén presentes.</p>
            </div>
            <button onclick="location.reload()" class="mt-6 bg-aifa-blue text-white px-6 py-2 rounded-lg hover:bg-aifa-dark">
              Recargar página
            </button>
          </div>
        `;
        
        // Recrear iconos para el error
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Indicadores AIFA</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                primary: {
                  50: '#edf5ff',
                  100: '#cfe1ff',
                  200: '#9bbdff',
                  300: '#6798ff',
                  400: '#3474ff',
                  500: '#0a52ff',
                  600: '#0841cc',
                  700: '#063199',
                  800: '#042066',
                  900: '#021033'
                },
                'aifa-blue': '#1E3A8A',
                'aifa-light': '#3B82F6',
                'aifa-green': '#047857',
                'aifa-amber': '#F59E0B'
              },
              fontFamily: {
                sans: ['"Nunito"', '"Inter"', 'system-ui', 'sans-serif']
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <noscript class="block text-center p-4 bg-red-100 text-red-600">
      Es necesario habilitar JavaScript para utilizar el sistema de indicadores.
    </noscript>
    <div id="app" class="min-h-screen"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>

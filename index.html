<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Indicadores - AIFA</title>
    <meta name="description" content="Sistema de Gestión de Indicadores del Aeropuerto Internacional Felipe Ángeles">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js para gráficas - VERSIÓN UMD -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    
    <!-- Supabase Client - VERSIÓN UMD CORRECTA -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    
    <!-- Configuración personalizada de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aifa-blue': '#1E40AF',
                        'aifa-light': '#3B82F6',
                        'aifa-dark': '#1E3A8A',
                        'aifa-gray': '#64748B'
                    }
                }
            }
        }
    </script>
    
    <!-- Estilos personalizados -->
    <style>
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-button {
            transition: all 0.2s ease;
        }
        
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-lg border-b-4 border-aifa-blue">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <!-- Logo y título -->
                <div class="flex items-center space-x-4">
                    <div class="flex-shrink-0">
                        <img src="./assets/AIFA_Logo.png" alt="Logo AIFA" class="h-12 w-auto" 
                             onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHZpZXdCb3g9IjAgMCA0OCA0OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iOCIgZmlsbD0iIzFFNDBBRiIvPgo8cGF0aCBkPSJNMTIgMzZIMzZWMTJIMTJWMzZaIiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiLz4KPHA+dGggZD0iTTE4IDI0TDI0IDE4TDMwIDI0IiBzdHJva2U9IndoaXRlIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgo8L3N2Zz4K';">
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-aifa-dark">
                            Aeropuerto Internacional Felipe Ángeles
                        </h1>
                        <p class="text-sm text-aifa-gray">Sistema de Gestión de Indicadores</p>
                    </div>
                </div>
                
                <!-- Info del usuario -->
                <div class="flex items-center space-x-3">
                    <div class="hidden sm:block text-right" id="user-info">
                        <p class="text-sm font-medium text-gray-900" id="user-name">Sistema cargando...</p>
                        <p class="text-xs text-gray-500" id="user-role">Verificando conexión</p>
                    </div>
                    <div class="bg-aifa-blue text-white rounded-full p-2">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Contenido principal -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Contenedor de vistas -->
        <div id="app-container" class="fade-in">
            <div class="text-center py-12">
                <div class="loading-spinner mx-auto mb-4"></div>
                <h2 class="text-xl font-semibold text-gray-900 mb-2">Inicializando Sistema</h2>
                <p class="text-gray-600" id="status-message">Cargando componentes...</p>
            </div>
        </div>
    </main>
    
    <!-- Scripts -->
    <script>
        // Configuración embebida
        const SUPABASE_URL = 'https://kxjldzcaeayguiqkqqyh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4amxkemNhZWF5Z3VpcWtxcXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY3NTQ5ODksImV4cCI6MjA3MjMzMDk4OX0.7c0s4zFimF4TH5_jyJbeTRUuxhGaSvVsCnamwxuKgbw';
        
        // Variables globales
        window.DEBUG = { enabled: true };
        window.MESSAGES = {
            errors: { network: 'Error de conexión', server: 'Error del servidor', generic: 'Error inesperado' }
        };
        
        function updateStatus(message) {
            const statusEl = document.getElementById('status-message');
            if (statusEl) statusEl.textContent = message;
            console.log('Estado:', message);
        }
        
        function showError(message) {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center py-12">
                    <i data-lucide="alert-circle" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
                    <h2 class="text-xl font-semibold text-gray-900 mb-2">Error de inicialización</h2>
                    <p class="text-gray-600 mb-4">${message}</p>
                    <button onclick="location.reload()" class="bg-aifa-blue text-white px-6 py-2 rounded-lg hover:bg-aifa-dark">
                        Recargar página
                    </button>
                </div>
            `;
            lucide.createIcons();
        }
        
        function showLogin() {
            document.getElementById('app-container').innerHTML = `
                <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">Iniciar Sesión</h2>
                        <p class="text-gray-600">Sistema de Indicadores AIFA</p>
                    </div>
                    <form id="login-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email corporativo</label>
                            <input type="email" id="email" required
                                   placeholder="usuario@aifa.aero"
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-aifa-blue">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                            <input type="password" id="password" required
                                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-aifa-blue">
                        </div>
                        <button type="submit" class="w-full bg-aifa-blue text-white py-2 px-4 rounded-md hover:bg-aifa-dark transition-colors">
                            Iniciar Sesión
                        </button>
                    </form>
                    <div id="login-error" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-md">
                        <p class="text-red-800 text-sm"></p>
                    </div>
                </div>
            `;
            
            // Event listener para el formulario de login
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                if (!email.endsWith('@aifa.aero')) {
                    showLoginError('El email debe ser del dominio @aifa.aero');
                    return;
                }
                
                try {
                    updateStatus('Verificando credenciales...');
                    const { data, error } = await window.supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) {
                        showLoginError('Email o contraseña incorrectos');
                        return;
                    }
                    
                    updateStatus('Login exitoso. Cargando aplicación...');
                    setTimeout(() => {
                        showDashboard();
                    }, 1000);
                    
                } catch (error) {
                    console.error('Error de login:', error);
                    showLoginError('Error de conexión. Intente nuevamente.');
                }
            });
        }
        
        function showLoginError(message) {
            const errorDiv = document.getElementById('login-error');
            errorDiv.querySelector('p').textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        function showDashboard() {
            document.getElementById('app-container').innerHTML = `
                <div class="text-center py-12">
                    <i data-lucide="check-circle" class="w-16 h-16 text-green-500 mx-auto mb-4"></i>
                    <h2 class="text-xl font-semibold text-gray-900 mb-2">Sistema Inicializado</h2>
                    <p class="text-gray-600 mb-4">Conexión establecida correctamente</p>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 max-w-md mx-auto">
                        <p class="text-blue-800 text-sm">
                            <strong>Siguiente paso:</strong> Implementar las vistas del sistema
                        </p>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            // Actualizar info del usuario
            document.getElementById('user-name').textContent = 'Usuario conectado';
            document.getElementById('user-role').textContent = 'Sistema activo';
        }
        
        // Función de inicialización
        async function initApp() {
            try {
                // Paso 1: Verificar Lucide
                updateStatus('Inicializando iconos...');
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                    console.log('✅ Lucide inicializado');
                } else {
                    throw new Error('Lucide no disponible');
                }
                
                // Paso 2: Verificar Supabase
                updateStatus('Verificando Supabase...');
                console.log('window.supabase:', typeof window.supabase);
                
                if (!window.supabase) {
                    throw new Error('Supabase no está disponible en window.supabase');
                }
                
                if (typeof window.supabase.createClient !== 'function') {
                    throw new Error('window.supabase.createClient no es una función');
                }
                
                // Paso 3: Inicializar cliente Supabase
                updateStatus('Inicializando cliente Supabase...');
                window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Cliente Supabase inicializado');
                
                // Paso 4: Verificar conexión
                updateStatus('Verificando conexión...');
                const { data: { session } } = await window.supabase.auth.getSession();
                
                if (session) {
                    console.log('✅ Sesión activa encontrada');
                    showDashboard();
                } else {
                    console.log('ℹ️ No hay sesión activa, mostrando login');
                    showLogin();
                }
                
            } catch (error) {
                console.error('❌ Error de inicialización:', error);
                showError(`Error: ${error.message}`);
            }
        }
        
        // Inicializar cuando esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
